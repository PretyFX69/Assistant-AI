<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI CyberZain</title>
    <link rel="icon" href="https://raw.githubusercontent.com/zainfreefire015-ui/Hbg/refs/heads/main/file_000000007c9861fa86a90e4a915a62f0.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">

<!-- Markdown + Code highlighting -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" id="hljs-theme-dark">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
:root {
  --font-family: "Inter", sans-serif;
  --radius-sm: 8px; --radius-md: 12px; --radius-full: 9999px;
  --transition: 0.3s ease;
  --sidebar-width: 280px;
  --header-height: 60px;
}

[data-theme="dark"] {
  --bg-main: #16161a; --bg-sidebar: #24242a; --bg-input: #1f1f25;
  --bg-hover: #3a3a41; --bg-active: #4a4d50; --bg-message-user: #2d2d33;
  --bg-message-assistant: #24242a; --text-primary: #f1f1f1; --text-secondary: #8f8f9a;
  --border-color: #34343e; --accent-color: #a78bfa; --accent-hover: #c0aaff;
  --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
  --overlay-color: rgba(0, 0, 0, 0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { 
  height: 100%; 
  overflow: hidden;
}

body {
  font-family: var(--font-family);
  background: var(--bg-main); 
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
}

/* === Fade in animation === */
@keyframes fadeIn { 
  from { opacity: 0; transform: translateY(10px); } 
  to { opacity: 1; transform: translateY(0); } 
}

/* === Mobile overlay === */
#mobile-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--overlay-color);
  z-index: 99;
  display: none;
}

#mobile-overlay.visible {
  display: block;
}

/* === Header === */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-height);
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  padding: 0 16px;
  z-index: 101;
  gap: 12px;
}

.burger-btn {
  background: transparent;
  border: none; 
  border-radius: var(--radius-md);
  padding: 8px;
  cursor: pointer;
  display: flex; 
  align-items: center; 
  justify-content: center;
  transition: background-color var(--transition);
}

.burger-btn:hover { 
  background: var(--bg-hover); 
}

.burger-btn svg { 
  width: 24px; 
  height: 24px; 
  stroke: var(--text-primary); 
  stroke-width: 2;
  fill: none;
}

#header-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
}

/* === Sidebar === */
#sidebar {
  position: fixed; 
  top: 0; 
  left: 0;
  width: var(--sidebar-width); 
  height: 100vh;
  background: var(--bg-sidebar); 
  padding: 16px;
  display: flex; 
  flex-direction: column;
  transition: transform var(--transition);
  z-index: 100;
  border-right: 1px solid var(--border-color);
}

#sidebar.collapsed {
  transform: translateX(-100%);
}

.sidebar-content {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding-top: var(--header-height);
}

.sidebar-top { 
  flex-grow: 1; 
  display: flex; 
  flex-direction: column; 
  gap: 16px; 
  padding-top: 16px;
}

.sidebar-footer { 
  flex-shrink: 0; 
  padding-top: 16px;
  border-top: 1px solid var(--border-color);
}

.sidebar-item {
  display: flex; 
  align-items: center;
  border: none; 
  background: var(--bg-input); 
  color: var(--text-secondary);
  height: 48px; 
  width: 100%; 
  border-radius: var(--radius-md);
  cursor: pointer; 
  padding: 0 12px; 
  gap: 12px;
  transition: all var(--transition);
  white-space: nowrap; 
  overflow: hidden;
  font-size: 14px;
  text-align: left;
}

.sidebar-item:hover { 
  background-color: var(--bg-hover); 
  color: var(--text-primary); 
}

.sidebar-item svg {
  width: 20px;
  height: 20px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  flex-shrink: 0;
}

.item-text { 
  flex-grow: 1; 
}

#chat-list-container { 
  margin-top: 20px; 
  flex-grow: 1; 
  overflow-y: auto; 
}

/* === Main content === */
#main { 
  flex-grow: 1; 
  display: flex; 
  flex-direction: column; 
  height: 100vh;
  transition: margin-left var(--transition);
  margin-top: var(--header-height);
}

#main.sidebar-open {
  margin-left: var(--sidebar-width);
}

#chat-container { 
  flex-grow: 1; 
  display: flex; 
  flex-direction: column; 
  justify-content: flex-end;
  min-height: 0;
}

#chat-messages {
  overflow-y: auto; 
  padding: 20px; 
  display: flex; 
  flex-direction: column;
  gap: 32px; 
  max-width: 900px;
  margin: 0 auto; 
  width: 100%;
  scroll-behavior: smooth;
  flex-grow: 1;
}

#empty-state { 
  text-align: center; 
  margin: auto 0; 
  padding-bottom: 20vh; 
  animation: fadeIn 0.5s ease; 
}

#empty-state h2 { 
  font-size: 2.2rem; 
  color: var(--text-secondary); 
  font-weight: 600; 
}

/* === Messages === */
.message-wrapper { 
  display: flex; 
  gap: 16px; 
  animation: fadeIn 0.3s ease;
  max-width: 100%;
}

.message-wrapper.user { 
  justify-content: flex-end; 
}

.message-bubble {
  padding: 16px; 
  border-radius: var(--radius-md); 
  max-width: 80%;
  line-height: 1.6; 
  word-wrap: break-word; 
  font-size: 15px;
  background: var(--bg-message-assistant); 
  border: 1px solid var(--border-color);
  position: relative;
}

.user .message-bubble { 
  background: var(--bg-message-user); 
}

/* Code blocks styling */
.message-bubble pre {
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-sm);
  padding: 12px;
  overflow-x: auto;
  margin: 8px 0;
}

.message-bubble code {
  font-family: 'Fira Code', monospace;
  font-size: 14px;
}

.message-bubble p:last-child {
  margin-bottom: 0;
}

/* === Thinking animation === */
.thinking-dots { 
  display: inline-block; 
  width: 24px; 
  text-align: left; 
}

.thinking-dots span {
  display: inline-block; 
  width: 6px; 
  height: 6px; 
  margin-right: 4px;
  background-color: var(--text-secondary); 
  border-radius: 50%;
  animation: blink 1.4s infinite both;
}

.thinking-dots span:nth-child(1) { animation-delay: 0s; }
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink { 
  0%, 80%, 100% { opacity: 0; }
  40% { opacity: 1; } 
}

.blinking-cursor {
  animation: cursorBlink 1s infinite;
}

@keyframes cursorBlink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}

/* === Input area === */
#input-area { 
  padding: 16px 20px 20px; 
  width: 100%; 
  flex-shrink: 0;
  background: var(--bg-main);
}

#input-container {
  max-width: 900px; 
  margin: 0 auto; 
  background: var(--bg-input);
  border-radius: var(--radius-full); 
  padding: 8px;
  border: 2px solid transparent; 
  display: flex; 
  align-items: flex-end; 
  gap: 8px;
  box-shadow: var(--shadow); 
  transition: border-color var(--transition);
}

#input-container:focus-within { 
  border-color: var(--accent-color); 
}

#main-input {
  flex-grow: 1; 
  border: none; 
  outline: none; 
  background: transparent;
  color: var(--text-primary); 
  font-size: 16px; 
  resize: none;
  line-height: 24px; 
  padding: 6px 12px; 
  max-height: 200px;
  min-height: 24px;
  font-family: var(--font-family);
}

#main-input::placeholder { 
  color: var(--text-secondary); 
}

.input-btn {
  width: 36px; 
  height: 36px; 
  background: var(--bg-active); 
  color: var(--text-secondary);
  border: none; 
  border-radius: 50%; 
  cursor: pointer; 
  flex-shrink: 0;
  display: flex; 
  align-items: center; 
  justify-content: center;
  transition: all var(--transition);
}

.input-btn:hover:not(:disabled) { 
  background-color: var(--bg-hover); 
  color: var(--text-primary); 
}

.input-btn svg { 
  width: 20px; 
  height: 20px; 
  stroke: currentColor; 
  fill: none; 
  stroke-width: 2; 
}

#send-btn:not(:disabled) { 
  background-color: var(--accent-color);
  color: white;
}

#send-btn:not(:disabled):hover {
  background-color: var(--accent-hover);
}

#send-btn:disabled { 
  cursor: not-allowed;
  opacity: 0.5;
}

/* === New chat button === */
#new-chat-fab {
  position: fixed;
  right: 20px;
  bottom: 100px;
  width: 56px;
  height: 56px;
  background: var(--accent-color);
  color: white;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow);
  transition: all var(--transition);
  z-index: 102;
}

#new-chat-fab:hover {
  background: var(--accent-hover);
  transform: scale(1.1);
}

#new-chat-fab svg {
  width: 24px;
  height: 24px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}

/* === Responsive design === */
@media (max-width: 1024px) {
  #main.sidebar-open {
    margin-left: 0;
  }
  
  #sidebar.collapsed {
    transform: translateX(-100%);
  }
  
  #mobile-overlay.visible {
    display: block;
  }
}

@media (max-width: 768px) {
  :root {
    --sidebar-width: 280px;
  }
  
  #chat-messages {
    padding: 16px;
    gap: 24px;
  }
  
  #empty-state h2 {
    font-size: 1.8rem;
  }
  
  .message-bubble {
    max-width: 90%;
    font-size: 14px;
    padding: 12px;
  }
  
  #input-area {
    padding: 12px 16px 16px;
  }
  
  #input-container {
    border-radius: var(--radius-md);
    padding: 6px;
  }
  
  #main-input {
    font-size: 16px; /* Prevents zoom on iOS */
  }
  
  #new-chat-fab {
    right: 16px;
    bottom: 90px;
    width: 48px;
    height: 48px;
  }
  
  #new-chat-fab svg {
    width: 20px;
    height: 20px;
  }
}

@media (max-width: 480px) {
  #header {
    padding: 0 12px;
  }
  
  #chat-messages {
    padding: 12px;
    gap: 20px;
  }
  
  .message-bubble {
    max-width: 95%;
    padding: 10px 12px;
  }
  
  #input-area {
    padding: 8px 12px 12px;
  }
}

/* === Scrollbar styling === */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--text-secondary);
}
</style>
</head>
<body>

<!-- Mobile overlay -->
<div id="mobile-overlay"></div>

<!-- Header -->
<div id="header">
  <button id="sidebar-toggle" class="burger-btn">
    <svg viewBox="0 0 24 24">
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>
  <div id="header-title">CyberZain-AI</div>
</div>

<!-- Sidebar -->
<div id="sidebar" class="collapsed">
  <div class="sidebar-content">
    <div class="sidebar-top">
      <button class="sidebar-item" id="new-chat-btn">
        <svg viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span class="item-text">New Chat</span>
      </button>
      <div id="chat-list-container">
        <div id="chat-list"></div>
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="sidebar-item" id="settings-btn">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span class="item-text">Settings</span>
      </button>
    </div>
  </div>
</div>

<!-- Main content -->
<div id="main" class="sidebar-closed">
  <div id="chat-container">
    <div id="chat-messages">
      <div id="empty-state">
        <h2>Apa Yang Bisa CyberZain Bantu?</h2>
      </div>
    </div>
    <div id="input-area">
      <div id="input-container">
        <textarea id="main-input" placeholder="Enter your message..." rows="1"></textarea>
        <button id="send-btn" class="input-btn" disabled>
          <svg viewBox="0 0 24 24">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22,2 15,22 11,13 2,9"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Floating new chat button -->
<button id="new-chat-fab">
  <svg viewBox="0 0 24 24">
    <line x1="12" y1="5" x2="12" y2="19"/>
    <line x1="5" y1="12" x2="19" y2="12"/>
  </svg>
</button>

<script>
'use strict';

document.addEventListener("DOMContentLoaded", () => {
  // Elements
  const chatMessages = document.getElementById("chat-messages");
  const mainInput = document.getElementById("main-input");
  const sendBtn = document.getElementById("send-btn");
  const sidebar = document.getElementById("sidebar");
  const sidebarToggle = document.getElementById("sidebar-toggle");
  const main = document.getElementById("main");
  const mobileOverlay = document.getElementById("mobile-overlay");
  const newChatBtn = document.getElementById("new-chat-btn");
  const newChatFab = document.getElementById("new-chat-fab");

  let isLoading = false;
  let isSidebarOpen = false;

  // Check if mobile
  const isMobile = () => window.innerWidth <= 1024;

  // Markdown configuration
  if (typeof marked !== 'undefined') {
    marked.setOptions({
      breaks: true,
      highlight: (code, lang) => {
        if (typeof hljs !== 'undefined') {
          return hljs.getLanguage(lang)
            ? hljs.highlight(code, { language: lang }).value
            : hljs.highlightAuto(code).value;
        }
        return code;
      }
    });
  }

  // Utility functions
  function scrollToBottom() {
    requestAnimationFrame(() => {
      chatMessages.scrollTop = chatMessages.scrollHeight;
    });
  }

  function toggleSidebar() {
    isSidebarOpen = !isSidebarOpen;
    
    if (isSidebarOpen) {
      sidebar.classList.remove('collapsed');
      if (!isMobile()) {
        main.classList.add('sidebar-open');
      } else {
        mobileOverlay.classList.add('visible');
      }
    } else {
      sidebar.classList.add('collapsed');
      main.classList.remove('sidebar-open');
      mobileOverlay.classList.remove('visible');
    }
  }

  function closeSidebar() {
    if (isSidebarOpen) {
      isSidebarOpen = false;
      sidebar.classList.add('collapsed');
      main.classList.remove('sidebar-open');
      mobileOverlay.classList.remove('visible');
    }
  }

  function addMessage(text, role, isThinking = false) {
    const emptyState = document.getElementById('empty-state');
    if (emptyState) {
      emptyState.remove();
    }

    const wrapper = document.createElement('div');
    wrapper.className = `message-wrapper ${role}`;
    
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    
    if (isThinking) {
      bubble.innerHTML = '<span class="thinking-dots"><span></span><span></span><span></span></span>';
    } else {
      if (typeof marked !== 'undefined') {
        bubble.innerHTML = marked.parse(text);
      } else {
        bubble.textContent = text;
      }
    }
    
    wrapper.appendChild(bubble);
    chatMessages.appendChild(wrapper);
    scrollToBottom();
    return bubble;
  }

  function updateMessage(bubbleEl, newText, isFinal = false) {
    const thinking = bubbleEl.querySelector('.thinking-dots');
    
    if (thinking) {
      bubbleEl.innerHTML = `<span class="streaming-text">${escapeHtml(newText)}</span><span class="blinking-cursor">▍</span>`;
    } else if (!isFinal) {
      const textEl = bubbleEl.querySelector('.streaming-text');
      if (textEl) {
        textEl.textContent = newText;
      }
    } else {
      if (typeof marked !== 'undefined') {
        bubbleEl.innerHTML = marked.parse(newText);
      } else {
        bubbleEl.textContent = newText;
      }
    }
    
    scrollToBottom();
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function adjustTextareaHeight() {
    mainInput.style.height = 'auto';
    const maxHeight = 200;
    const scrollHeight = mainInput.scrollHeight;
    mainInput.style.height = Math.min(scrollHeight, maxHeight) + 'px';
  }

  function updateSendButton() {
    const hasText = mainInput.value.trim().length > 0;
    sendBtn.disabled = !hasText || isLoading;
  }

  function clearChat() {
    chatMessages.innerHTML = '<div id="empty-state"><h2>How can I help you?</h2></div>';
    mainInput.value = '';
    adjustTextareaHeight();
    updateSendButton();
  }

  async function sendMessage() {
    const messageText = mainInput.value.trim();
    if (!messageText || isLoading) return;

    isLoading = true;
    updateSendButton();

    // Add user message
    addMessage(messageText, "user");
    
    // Clear input
    mainInput.value = "";
    adjustTextareaHeight();
    updateSendButton();

    // Add thinking indicator
    const assistantBubble = addMessage("", "assistant", true);

    try {
      const response = await fetch("https://jolly-wildflower-df91.drushlak01.workers.dev/", {
        method: "POST",
        headers: { 
          "Content-Type": "application/json" 
        },
        body: JSON.stringify({ 
          contents: [{ 
            role: "user", 
            parts: [{ text: messageText }] 
          }] 
        }),
      });

      if (!response.ok) {
        throw new Error(`HTTP error! status: ${response.status}`);
      }

      const data = await response.json();
      const fullResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
      
      if (!fullResponse) {
        throw new Error("Empty response from API");
      }

      // Simulate streaming
      let displayedText = '';
      const streamingDelay = Math.max(1, Math.floor(3000 / fullResponse.length));
      
      for (let i = 0; i < fullResponse.length; i++) {
        displayedText += fullResponse[i];
        updateMessage(assistantBubble, displayedText);
        
        // Add small delay for streaming effect
        if (i % 3 === 0) {
          await new Promise(resolve => setTimeout(resolve, streamingDelay));
        }
      }
      
      // Final update with proper markdown
      updateMessage(assistantBubble, fullResponse, true);
      
    } catch (error) {
      console.error('Send message error:', error);
      updateMessage(assistantBubble, `Error: ${error.message}`, true);
    } finally {
      isLoading = false;
      updateSendButton();
      mainInput.focus();
    }
  }

  // Event listeners
  sidebarToggle.addEventListener('click', toggleSidebar);
  mobileOverlay.addEventListener('click', closeSidebar);
  
  sendBtn.addEventListener('click', sendMessage);
  
  newChatBtn.addEventListener('click', () => {
    clearChat();
    if (isMobile()) {
      closeSidebar();
    }
  });
  
  newChatFab.addEventListener('click', clearChat);

  mainInput.addEventListener('input', () => {
    adjustTextareaHeight();
    updateSendButton();
  });

  mainInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Handle window resize
  window.addEventListener('resize', () => {
    if (!isMobile() && isSidebarOpen) {
      main.classList.add('sidebar-open');
      mobileOverlay.classList.remove('visible');
    } else if (isMobile() && isSidebarOpen) {
      main.classList.remove('sidebar-open');
      mobileOverlay.classList.add('visible');
    }
  });

  // Handle back button on mobile
  window.addEventListener('popstate', () => {
    if (isSidebarOpen && isMobile()) {
      closeSidebar();
    }
  });

  // Initial setup
  updateSendButton();
  mainInput.focus();

  // Close sidebar when clicking outside on mobile
  document.addEventListener('click', (e) => {
    if (isMobile() && isSidebarOpen && 
        !sidebar.contains(e.target) && 
        !sidebarToggle.contains(e.target)) {
      closeSidebar();
    }
  });

  // Prevent body scroll when sidebar is open on mobile
  const preventScroll = (e) => {
    if (isMobile() && isSidebarOpen) {
      e.preventDefault();
    }
  };

  document.addEventListener('touchmove', preventScroll, { passive: false });
});
</script>
</body>
</html>
